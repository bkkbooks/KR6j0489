body:
  text: 有二印一者身印二者隱形印也先作身印當心誦真言七遍加持身五處謂五處者一心二額三左肩四右肩五頂是也身印相虛心合拳以二中指指端屈纏著二頭指端是大金剛輪印也真言曰唵引摩利支􅁥娑嚩訶次作隱形印當心念誦一百八遍依此印真言加持力故一切天魔惡鬼不善邪魔外道不得其便亦無見其行者形體雖求覓空盡邪力不得持明行者形體是故每七種所行時以印真言可加持七種所行時者一睡眠時二覺悟時三沐浴時四遠行時五逢客時六飲食時七行廁時以身印加持五處以身印想隱入金剛堅固智拳城中其隱形印左手作虛掌拳之舒右掌五輪覆其左虛掌拳上不令間隙其心身真言曰唵引阿爾底也引摩利支􅁥娑嚩賀
